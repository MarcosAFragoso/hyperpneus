<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Entrar - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-5">
  <div class="container">
    <a class="navbar-brand" href="index.html">HyperPneus</a>
  </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div id="alerta" class="alert d-none mb-3"></div>
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="mb-1 fw-bold">Bem-vindo!</h3>
                    <p class="text-muted mb-4">Faça login para continuar</p>
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" id="loginEmail" class="form-control" placeholder="seu@email.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <input type="password" id="loginSenha" class="form-control" placeholder="********">
                    </div>
                    <button onclick="fazerLogin()" class="btn btn-primary w-100 py-2 fw-bold">ENTRAR</button>
                    <div class="text-center mt-3">
                        <a href="#" class="text-muted small d-block mb-2">Esqueci minha senha</a>
                        <span class="text-muted small">Não tem conta? </span>
                        <a href="cadastro.html" class="small fw-bold">Criar conta grátis</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const API = '';

function mostrarAlerta(msg, tipo = 'danger') {
    const el = document.getElementById('alerta');
    el.className = `alert alert-${tipo}`;
    el.textContent = msg;
    el.classList.remove('d-none');
    setTimeout(() => el.classList.add('d-none'), 4000);
}

async function fazerLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value;
    if (!email || !senha) return mostrarAlerta('Preencha e-mail e senha.');

    try {
        const res = await fetch(`${API}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if (!res.ok) return mostrarAlerta(data.erro);

        localStorage.setItem('cliente', JSON.stringify(data.cliente));

        // Migra carrinho anônimo se houver itens salvos
        const itensLocais = JSON.parse(localStorage.getItem('carrinho') || '[]');
        if (itensLocais.length) {
            try {
                await fetch('/api/pedidos/migrar-carrinho', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ itens: itensLocais })
                });
                localStorage.removeItem('carrinho');
            } catch (e) { /* migração falhou silenciosamente */ }
        }

        mostrarAlerta('Login realizado! Redirecionando...', 'success');

        // ← CORRIGIDO: verifica ?next= e redireciona corretamente
        const params = new URLSearchParams(window.location.search);
        const next = params.get('next');

        setTimeout(() => {
            if (next === 'checkout') {
                window.location.href = 'checkout.html';
            } else if (next === 'carrinho') {
                window.location.href = 'carrinho.html';
            } else if (next) {
                window.location.href = next + '.html';
            } else {
                window.location.href = 'minha-conta.html';
            }
        }, 1000);

    } catch (err) {
        mostrarAlerta('Erro ao conectar com o servidor.');
    }
}

document.addEventListener('keydown', e => {
    if (e.key === 'Enter') fazerLogin();
});

window.onload = () => {
    if (localStorage.getItem('cliente')) {
        // Já logado — redireciona para ?next ou minha conta
        const params = new URLSearchParams(window.location.search);
        const next = params.get('next');
        window.location.href = next ? next + '.html' : 'minha-conta.html';
    }
};
</script>
</body>
</html>
