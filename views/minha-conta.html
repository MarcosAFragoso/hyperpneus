<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --kabum-blue: #0060b1; --kabum-orange: #ff6500; }
        body { background-color: #f2f3f5; font-family: 'Segoe UI', sans-serif; }
        .list-group-item.active { background-color: var(--kabum-blue); border-color: var(--kabum-blue); font-weight: bold; }
        .order-card { background: white; border-radius: 4px; border: 1px solid #eee; margin-bottom: 15px; padding: 15px; }
        .btn-kabum { background: var(--kabum-orange); color: #fff; font-weight: bold; font-size: 12px; padding: 8px 15px; border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="index.html">HYPERPNEUS</a>
        <div class="text-white small"><span id="nomeNav"></span> <button onclick="sair()" class="btn btn-outline-light btn-sm">Sair</button></div></div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group shadow-sm">
                    <a href="#" onclick="mostrarAba('pedidos')" class="list-group-item list-group-item-action active" id="aba-pedidos">Meus Pedidos</a>
                    <a href="#" onclick="mostrarAba('garagem')" class="list-group-item list-group-item-action" id="aba-garagem">Minha Garagem</a>
                    <a href="#" onclick="mostrarAba('cartoes')" class="list-group-item list-group-item-action" id="aba-cartoes">Meus Cartões</a>
                    <a href="#" onclick="mostrarAba('enderecos')" class="list-group-item list-group-item-action" id="aba-enderecos">Meus Endereços</a>
                    <a href="#" onclick="mostrarAba('dados')" class="list-group-item list-group-item-action" id="aba-dados">Dados Pessoais</a>
                </div>
            </div>
            <div class="col-md-9">
                <div id="sec-pedidos"><h5>Meus Pedidos</h5><div id="listaPedidos"></div></div>
                <div id="sec-garagem" class="d-none"><h5>Minha Garagem</h5><div id="listaVeiculos"></div></div>
                <div id="sec-cartoes" class="d-none"><h5>Meus Cartões</h5><div id="listaCartoes"></div></div>
                <div id="sec-enderecos" class="d-none"><h5>Meus Endereços</h5><div id="listaEnderecos"></div></div>
                <div id="sec-dados" class="d-none"><h5>Dados Pessoais</h5><div id="formDados"></div></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let clienteId = null;

        function mostrarAba(aba) {
            document.querySelectorAll('.list-group-item').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('[id^="sec-"]').forEach(s => s.classList.add('d-none'));
            document.getElementById(`aba-${aba}`).classList.add('active');
            document.getElementById(`sec-${aba}`).classList.remove('d-none');
            if(aba==='pedidos') carregarPedidos();
            else if(aba==='garagem') carregarVeiculos();
            else if(aba==='cartoes') carregarCartoes();
            else if(aba==='enderecos') carregarEnderecos();
            else if(aba==='dados') carregarDados();
        }

        async function carregarPedidos() {
            const lista = document.getElementById('listaPedidos');
            const res = await fetch('/api/pedidos', { credentials: 'include' });
            const p = await res.json();
            lista.innerHTML = p.map(x => `
                <div class="order-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <strong>Pedido #${x.id} | ${parseFloat(x.total).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})} | <i>${x.status.replace(/_/g, ' ')}</i></strong>
                        <div>
                            <a href="confirmacao.html?pedido=${x.id}&modo=visualizar" class="btn btn-outline-dark btn-sm">DETALHES</a>
                            <a href="troca.html?pedido=${x.id}" class="btn btn-kabum">GERENCIAR</a>
                        </div>
                    </div>
                </div>`).join('');
        }

        async function carregarCartoes() {
            const res = await fetch(`/api/clientes/${clienteId}/cartoes`, { credentials: 'include' });
            const cs = await res.json();
            document.getElementById('listaCartoes').innerHTML = cs.map(c => `
                <div class="order-card d-flex justify-content-between align-items-center">
                    <span>${c.bandeira} - ****${c.numero_final}</span>
                    <button class="btn btn-sm btn-outline-danger" onclick="remover('cartoes', ${c.id})"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function carregarVeiculos() {
            const res = await fetch(`/api/clientes/${clienteId}/veiculos`, { credentials: 'include' });
            const vs = await res.json();
            document.getElementById('listaVeiculos').innerHTML = vs.map(v => `
                <div class="order-card d-flex justify-content-between align-items-center">
                    <span>${v.marca} ${v.modelo} (Ano: ${v.ano})</span>
                    <button class="btn btn-sm btn-outline-danger" onclick="remover('veiculos', ${v.id})"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function carregarEnderecos() {
            const res = await fetch(`/api/clientes/${clienteId}/enderecos`, { credentials: 'include' });
            const es = await res.json();
            document.getElementById('listaEnderecos').innerHTML = es.map(e => `
                <div class="order-card d-flex justify-content-between align-items-center">
                    <span>${e.logradouro}, ${e.numero}</span>
                    <button class="btn btn-sm btn-outline-danger" onclick="remover('enderecos', ${e.id})"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function carregarDados() {
            const res = await fetch(`/api/clientes/${clienteId}`, { credentials: 'include' });
            const c = await res.json();
            document.getElementById('formDados').innerHTML = `<p><b>Nome:</b> ${c.nome} ${c.sobrenome}</p><p><b>Email:</b> ${c.email}</p><button class="btn btn-danger btn-sm" onclick="inativarConta()">Inativar Conta</button>`;
        }

        async function remover(tipo, id) {
            if(!confirm('Tem certeza que deseja excluir?')) return;
            await fetch(`/api/clientes/${clienteId}/${tipo}/${id}`, { method: 'DELETE', credentials: 'include' });
            mostrarAba(tipo === 'veiculos' ? 'garagem' : tipo);
        }

        function sair() { localStorage.removeItem('cliente'); window.location.href = 'login.html'; }
        
        window.onload = () => {
            const c = JSON.parse(localStorage.getItem('cliente') || '{}');
            if(!c.id) window.location.href = 'login.html';
            clienteId = c.id;
            document.getElementById('nomeNav').textContent = `Olá, ${c.nome}!`;
            mostrarAba('pedidos');
        };
    </script>
</body>
</html>
