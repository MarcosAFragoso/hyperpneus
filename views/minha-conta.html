<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta</title>

    <link rel="stylesheet" href="/CSS/bootstrap.min.css">
    <link rel="stylesheet" href="/CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light px-3">
    <a class="navbar-brand" href="#">Minha Conta</a>

    <div class="ms-auto">
        <a href="/index.html" class="btn btn-outline-primary btn-sm">
            <i class="fas fa-store"></i> Ir para Loja
        </a>
    </div>
</nav>

<div class="container mt-4">

    <!-- DADOS -->
    <h4>Meus Dados</h4>
    <div id="dadosContainer" class="mb-4"></div>

    <!-- ENDEREÇOS -->
    <h4>Endereços</h4>
    <div id="listaEnderecos" class="mb-4"></div>

    <!-- VEÍCULOS -->
    <h4>Minha Garagem</h4>
    <div id="listaVeiculos" class="mb-4"></div>

    <!-- CARTÕES -->
    <h4>Cartões</h4>
    <div id="listaCartoes" class="mb-4"></div>

    <!-- PEDIDOS -->
    <h4>Meus Pedidos</h4>
    <div id="listaPedidos"></div>

</div>

<script>
const clienteId = 1; // depois você pode dinamizar isso

// ================= DADOS =================
async function carregarDados() {
    const res = await fetch(`/api/clientes/${clienteId}`, { credentials: 'include' });
    const d = await res.json();

    dadosContainer.innerHTML = `
        <div class="card p-3">
            <strong>${d.nome}</strong><br>
            ${d.email}
            <button class="btn btn-sm btn-outline-primary mt-2" onclick="editarDados()">
                <i class="fas fa-edit"></i> Editar
            </button>
        </div>
    `;
}

// ================= ENDEREÇOS =================
async function carregarEnderecos() {
    const res = await fetch(`/api/clientes/${clienteId}/enderecos`);
    const es = await res.json();

    listaEnderecos.innerHTML = `
        <button class="btn btn-success btn-sm mb-2" onclick="addEndereco()">
            <i class="fas fa-plus"></i> Adicionar
        </button>

        ${es.map(e => `
            <div class="card p-3 mb-2">
                <strong>${e.logradouro}, ${e.numero}</strong><br>
                ${e.bairro} - ${e.cidade}/${e.estado}<br>
                CEP: ${e.cep}

                <div class="mt-2">
                    <button class="btn btn-sm btn-outline-primary" onclick="editEndereco(${e.id})">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="remover('enderecos', ${e.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('')}
    `;
}

// ================= VEÍCULOS =================
async function carregarVeiculos() {
    const res = await fetch(`/api/clientes/${clienteId}/veiculos`);
    const vs = await res.json();

    listaVeiculos.innerHTML = `
        <button class="btn btn-success btn-sm mb-2" onclick="addVeiculo()">
            <i class="fas fa-plus"></i> Adicionar
        </button>

        ${vs.map(v => `
            <div class="card p-3 mb-2">
                <strong>${v.marca} ${v.modelo}</strong><br>
                ${v.versao || ''} - ${v.ano}

                <div class="mt-2">
                    <button class="btn btn-sm btn-outline-primary" onclick="editVeiculo(${v.id})">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="remover('veiculos', ${v.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('')}
    `;
}

// ================= CARTÕES =================
async function carregarCartoes() {
    const res = await fetch(`/api/clientes/${clienteId}/cartoes`);
    const cs = await res.json();

    listaCartoes.innerHTML = `
        <button class="btn btn-success btn-sm mb-2" onclick="addCartao()">
            <i class="fas fa-plus"></i> Adicionar
        </button>

        ${cs.map(c => `
            <div class="card p-3 mb-2 d-flex justify-content-between align-items-center">
                <span>${c.bandeira} - **** ${c.numero_final}</span>

                <div>
                    <button class="btn btn-sm btn-outline-primary" onclick="editCartao(${c.id})">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="remover('cartoes', ${c.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('')}
    `;
}

// ================= REMOVER =================
async function remover(tipo, id) {
    await fetch(`/api/clientes/${clienteId}/${tipo}/${id}`, {
        method: 'DELETE'
    });

    carregarTudo();
}

// ================= FUNÇÕES PLACEHOLDER =================
function addCartao() { alert("Abrir modal de cartão"); }
function editCartao(id) { alert("Editar cartão " + id); }

function addEndereco() { alert("Abrir modal endereço"); }
function editEndereco(id) { alert("Editar endereço " + id); }

function addVeiculo() { alert("Abrir modal veículo"); }
function editVeiculo(id) { alert("Editar veículo " + id); }

function editarDados() { alert("Editar dados"); }

// ================= LOAD =================
function carregarTudo() {
    carregarDados();
    carregarEnderecos();
    carregarVeiculos();
    carregarCartoes();
}

carregarTudo();

</script>

</body>
</html>
