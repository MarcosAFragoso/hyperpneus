<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --kabum-blue: #0060b1; --kabum-orange: #ff6500; }
        body { background-color: #f2f3f5; font-family: 'Segoe UI', sans-serif; }
        .list-group-item.active { background-color: var(--kabum-blue); border-color: var(--kabum-blue); font-weight: bold; }
        .order-card { background: white; border-radius: 4px; border: 1px solid #eee; margin-bottom: 15px; }
        .btn-kabum { background: var(--kabum-orange); color: #fff; font-weight: bold; font-size: 12px; padding: 8px 15px; border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="index.html">HYPERPNEUS</a>
        <div class="text-white small"><span id="nomeNav"></span> <button onclick="sair()" class="btn btn-outline-light btn-sm">Sair</button></div></div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group shadow-sm">
                    <a href="#" onclick="mostrarAba('pedidos')" class="list-group-item list-group-item-action active" id="aba-pedidos">Meus Pedidos</a>
                    <a href="#" onclick="mostrarAba('garagem')" class="list-group-item list-group-item-action" id="aba-garagem">Minha Garagem</a>
                    <a href="#" onclick="mostrarAba('cartoes')" class="list-group-item list-group-item-action" id="aba-cartoes">Meus Cartões</a>
                    <a href="#" onclick="mostrarAba('enderecos')" class="list-group-item list-group-item-action" id="aba-enderecos">Meus Endereços</a>
                    <a href="#" onclick="mostrarAba('dados')" class="list-group-item list-group-item-action" id="aba-dados">Dados Pessoais</a>
                </div>
            </div>
            <div class="col-md-9">
                <div id="sec-pedidos"><div id="listaPedidos"></div></div>
                <div id="sec-garagem" class="d-none"><div class="card shadow-sm p-3"><div class="d-flex justify-content-between mb-3"><strong>Garagem</strong><button class="btn btn-primary btn-sm" onclick="abrirModalVeiculo()">+ Adicionar</button></div><div id="listaVeiculos"></div></div></div>
                <div id="sec-cartoes" class="d-none"><div class="card shadow-sm p-3"><div class="d-flex justify-content-between mb-3"><strong>Cartões</strong><button class="btn btn-primary btn-sm" onclick="abrirModalCartao()">+ Adicionar</button></div><div id="listaCartoes"></div></div></div>
                <div id="sec-enderecos" class="d-none"><div class="card shadow-sm p-3"><div class="d-flex justify-content-between mb-3"><strong>Endereços</strong><button class="btn btn-primary btn-sm" onclick="abrirModalEndereco()">+ Adicionar</button></div><div id="listaEnderecos"></div></div></div>
                <div id="sec-dados" class="d-none"><div class="card shadow-sm p-4"><div id="formDados"></div></div></div>
            </div>
        </div>
    </div>

    <!-- Modal Dinâmico -->
    <div class="modal fade" id="modalGeral" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 id="modalTitle"></h5></div><div class="modal-body" id="corpoModal"></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let clienteId = null;

        function mostrarAba(aba) {
            document.querySelectorAll('.list-group-item').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('[id^="sec-"]').forEach(s => s.classList.add('d-none'));
            document.getElementById(`aba-${aba}`).classList.add('active');
            document.getElementById(`sec-${aba}`).classList.remove('d-none');
            if(aba==='pedidos') carregarPedidos();
            else if(aba==='garagem') carregarVeiculos();
            else if(aba==='cartoes') carregarCartoes();
            else if(aba==='enderecos') carregarEnderecos();
            else if(aba==='dados') carregarDados();
        }

        async function carregarPedidos() {
            const res = await fetch('/api/pedidos', { credentials: 'include' });
            const p = await res.json();
            document.getElementById('listaPedidos').innerHTML = p.map(x => `
                <div class="order-card p-3 shadow-sm">
                    <strong>Pedido #${x.id}</strong> - ${parseFloat(x.total).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
                    <div class="mt-2 text-muted">Status: ${x.status.replace(/_/g, ' ')}</div>
                    <div class="mt-2"><a href="confirmacao.html?pedido=${x.id}&modo=visualizar" class="btn btn-dark btn-sm">DETALHES</a> <a href="troca.html?pedido=${x.id}" class="btn btn-kabum">GERENCIAR</a></div>
                </div>`).join('');
        }

        // --- Módulos de listagem ---
        async function carregarCartoes() {
            const res = await fetch(`/api/clientes/${clienteId}/cartoes`, { credentials: 'include' });
            const cs = await res.json();
            document.getElementById('listaCartoes').innerHTML = cs.map(c => `
                <div class="d-flex justify-content-between border-bottom py-2">
                    <span>${c.bandeira} - ****${c.numero_final}</span>
                    <button class="btn btn-sm btn-outline-danger" onclick="remover('cartoes', ${c.id})"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function carregarVeiculos() {
            const res = await fetch(`/api/clientes/${clienteId}/veiculos`, { credentials: 'include' });
            const vs = await res.json();
            document.getElementById('listaVeiculos').innerHTML = vs.map(v => `
                <div class="d-flex justify-content-between border-bottom py-2">
                    <span>${v.marca} ${v.modelo} (${v.ano})</span>
                    <button class="btn btn-sm btn-outline-danger" onclick="remover('veiculos', ${v.id})"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function carregarEnderecos() {
            const res = await fetch(`/api/clientes/${clienteId}/enderecos`, { credentials: 'include' });
            const es = await res.json();
            document.getElementById('listaEnderecos').innerHTML = es.map(e => `
                <div class="d-flex justify-content-between border-bottom py-2">
                    <span>${e.logradouro}, ${e.numero}</span>
                    <button class="btn btn-sm btn-outline-danger" onclick="remover('enderecos', ${e.id})"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        // --- Formulários e Modais ---
        function abrirModalCartao() {
            document.getElementById('modalTitle').textContent = "Adicionar Cartão";
            document.getElementById('corpoModal').innerHTML = `
                <input id="bandeira" class="form-control mb-2" placeholder="Bandeira (Visa/Master)">
                <input id="numFinal" class="form-control mb-2" placeholder="Número Final (4 dígitos)">
                <button class="btn btn-primary w-100" onclick="salvar('cartoes', {bandeira: document.getElementById('bandeira').value, numero_final: document.getElementById('numFinal').value})">Salvar</button>`;
            new bootstrap.Modal(document.getElementById('modalGeral')).show();
        }

        function abrirModalVeiculo() {
            document.getElementById('modalTitle').textContent = "Adicionar Veículo";
            document.getElementById('corpoModal').innerHTML = `
                <input id="marca" class="form-control mb-2" placeholder="Marca">
                <input id="modelo" class="form-control mb-2" placeholder="Modelo">
                <input id="ano" class="form-control mb-2" type="number" placeholder="Ano">
                <button class="btn btn-primary w-100" onclick="salvar('veiculos', {marca: document.getElementById('marca').value, modelo: document.getElementById('modelo').value, ano: document.getElementById('ano').value})">Salvar</button>`;
            new bootstrap.Modal(document.getElementById('modalGeral')).show();
        }

        function abrirModalEndereco() {
            document.getElementById('modalTitle').textContent = "Adicionar Endereço";
            document.getElementById('corpoModal').innerHTML = `
                <input id="log" class="form-control mb-2" placeholder="Logradouro">
                <input id="num" class="form-control mb-2" placeholder="Número">
                <input id="cidade" class="form-control mb-2" placeholder="Cidade">
                <button class="btn btn-primary w-100" onclick="salvar('enderecos', {logradouro: document.getElementById('log').value, numero: document.getElementById('num').value, cidade: document.getElementById('cidade').value})">Salvar</button>`;
            new bootstrap.Modal(document.getElementById('modalGeral')).show();
        }

        async function salvar(tipo, dados) {
            await fetch(`/api/clientes/${clienteId}/${tipo}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados),
                credentials: 'include'
            });
            bootstrap.Modal.getInstance(document.getElementById('modalGeral')).hide();
            mostrarAba(tipo === 'veiculos' ? 'garagem' : tipo);
        }

        async function remover(tipo, id) {
            if(!confirm('Deseja excluir?')) return;
            await fetch(`/api/clientes/${clienteId}/${tipo}/${id}`, { method: 'DELETE', credentials: 'include' });
            mostrarAba(tipo === 'veiculos' ? 'garagem' : tipo);
        }

        function sair() { localStorage.removeItem('cliente'); window.location.href = 'login.html'; }

        window.onload = () => {
            const c = JSON.parse(localStorage.getItem('cliente') || '{}');
            if(!c.id) window.location.href = 'login.html';
            clienteId = c.id;
            document.getElementById('nomeNav').textContent = `Olá, ${c.nome}!`;
            carregarPedidos();
        };
    </script>
</body>
</html>
