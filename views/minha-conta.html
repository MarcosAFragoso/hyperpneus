<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #f5f5f5;
        }

        .card-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .item-card {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
    </style>
</head>

<body class="container mt-4">

    <h2 class="mb-4">Minha Conta</h2>

    <!-- ENDEREÇOS -->
    <div class="card-box">
        <h4>Endereços</h4>
        <div id="listaEnderecos"></div>
    </div>

    <!-- CARTÕES -->
    <div class="card-box">
        <h4>Cartões</h4>
        <div id="listaCartoes"></div>
    </div>

    <!-- MODAL ENDEREÇO -->
    <div class="modal fade" id="modalEndereco">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formEndereco">
                    <div class="modal-header">
                        <h5>Endereço</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <input type="hidden" id="enderecoId">

                        <input class="form-control mb-2" id="cep" placeholder="CEP" required>
                        <input class="form-control mb-2" id="logradouro" placeholder="Logradouro">
                        <input class="form-control mb-2" id="numero" placeholder="Número">
                        <input class="form-control mb-2" id="complemento" placeholder="Complemento">
                        <input class="form-control mb-2" id="bairro" placeholder="Bairro">
                        <input class="form-control mb-2" id="cidade" placeholder="Cidade">
                        <input class="form-control mb-2" id="estado" placeholder="Estado">
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-success">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL CARTÃO -->
    <div class="modal fade" id="modalCartao">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formCartao">
                    <div class="modal-header">
                        <h5>Cartão</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <input type="hidden" id="cartaoId">

                        <input class="form-control mb-2" id="numeroCartao" placeholder="Número do cartão" required>
                        <input class="form-control mb-2" id="bandeira" placeholder="Bandeira">
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-success">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


<script>
const clienteId = 1;

const listaEnderecos = document.getElementById('listaEnderecos');
const listaCartoes = document.getElementById('listaCartoes');

const modalEndereco = new bootstrap.Modal(document.getElementById('modalEndereco'));
const modalCartao = new bootstrap.Modal(document.getElementById('modalCartao'));

// ================= ENDEREÇOS =================
async function carregarEnderecos() {
    const res = await fetch(`/api/clientes/${clienteId}/enderecos`);
    const dados = await res.json();

    listaEnderecos.innerHTML = `
        <button class="btn btn-success btn-sm mb-2" onclick="abrirEndereco()">+ Adicionar</button>
        ${dados.map(e => `
            <div class="item-card d-flex justify-content-between">
                <span>${e.logradouro}, ${e.numero} - ${e.cidade}</span>
                <div>
                    <button class="btn btn-sm btn-outline-primary" onclick="editarEndereco(${e.id})">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="removerEndereco(${e.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('')}
    `;
}

function abrirEndereco() {
    document.getElementById('formEndereco').reset();
    enderecoId.value = '';
    modalEndereco.show();
}

async function editarEndereco(id) {
    const res = await fetch(`/api/clientes/${clienteId}/enderecos`);
    const lista = await res.json();
    const e = lista.find(x => x.id === id);

    enderecoId.value = e.id;
    cep.value = e.cep;
    logradouro.value = e.logradouro;
    numero.value = e.numero;
    complemento.value = e.complemento;
    bairro.value = e.bairro;
    cidade.value = e.cidade;
    estado.value = e.estado;

    modalEndereco.show();
}

formEndereco.onsubmit = async (e) => {
    e.preventDefault();

    const id = enderecoId.value;

    const body = {
        cep: cep.value,
        logradouro: logradouro.value,
        numero: numero.value,
        complemento: complemento.value,
        bairro: bairro.value,
        cidade: cidade.value,
        estado: estado.value
    };

    const url = `/api/clientes/${clienteId}/enderecos${id ? '/' + id : ''}`;

    await fetch(url, {
        method: id ? 'PUT' : 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });

    modalEndereco.hide();
    carregarEnderecos();
};

async function removerEndereco(id) {
    await fetch(`/api/clientes/${clienteId}/enderecos/${id}`, {method: 'DELETE'});
    carregarEnderecos();
}

// CEP automático
cep.addEventListener('blur', async () => {
    const v = cep.value.replace(/\D/g, '');
    if (v.length !== 8) return;

    const res = await fetch(`https://viacep.com.br/ws/${v}/json/`);
    const d = await res.json();

    logradouro.value = d.logradouro || '';
    bairro.value = d.bairro || '';
    cidade.value = d.localidade || '';
    estado.value = d.uf || '';
});


// ================= CARTÕES =================
async function carregarCartoes() {
    const res = await fetch(`/api/clientes/${clienteId}/cartoes`);
    const cs = await res.json();

    listaCartoes.innerHTML = `
        <button class="btn btn-success btn-sm mb-2" onclick="abrirCartao()">+ Adicionar</button>
        ${cs.map(c => `
            <div class="item-card d-flex justify-content-between">
                <span>${c.bandeira} - ****${c.numero_final}</span>
                <div>
                    <button class="btn btn-sm btn-outline-primary" onclick="editarCartao(${c.id})">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="removerCartao(${c.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('')}
    `;
}

function abrirCartao() {
    formCartao.reset();
    cartaoId.value = '';
    modalCartao.show();
}

async function editarCartao(id) {
    const res = await fetch(`/api/clientes/${clienteId}/cartoes`);
    const lista = await res.json();
    const c = lista.find(x => x.id === id);

    cartaoId.value = c.id;
    bandeira.value = c.bandeira;

    modalCartao.show();
}

formCartao.onsubmit = async (e) => {
    e.preventDefault();

    const id = cartaoId.value;

    const body = {
        numero: numeroCartao.value,
        bandeira: bandeira.value
    };

    const url = `/api/clientes/${clienteId}/cartoes${id ? '/' + id : ''}`;

    await fetch(url, {
        method: id ? 'PUT' : 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });

    modalCartao.hide();
    carregarCartoes();
};

async function removerCartao(id) {
    await fetch(`/api/clientes/${clienteId}/cartoes/${id}`, {method: 'DELETE'});
    carregarCartoes();
}


// INIT
carregarEnderecos();
carregarCartoes();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
