<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --kabum-blue: #0060b1; --kabum-orange: #ff6500; }
        body { background-color: #f2f3f5; }
        .list-group-item.active { background-color: var(--kabum-blue); border-color: var(--kabum-blue); font-weight: bold; }
        .order-card { background: white; border-radius: 4px; border: 1px solid #eee; margin-bottom: 15px; }
        .order-header { padding: 10px 15px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .btn-kabum { background: var(--kabum-orange); color: #fff; font-weight: bold; font-size: 12px; padding: 8px 15px; border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container"><a class="navbar-brand fw-bold" href="index.html">HYPERPNEUS</a>
        <button onclick="sair()" class="btn btn-outline-light btn-sm">Sair</button></div>
    </nav>

    <div class="container my-5">
        <h2 class="mb-4 fw-bold">Minha Conta</h2>
        <div id="alerta" class="alert d-none"></div>
        <div class="row">
            <div class="col-md-3">
                <div class="list-group shadow-sm">
                    <a href="#" onclick="mostrarAba('pedidos')" class="list-group-item list-group-item-action active" id="aba-pedidos">Meus Pedidos</a>
                    <a href="#" onclick="mostrarAba('garagem')" class="list-group-item list-group-item-action" id="aba-garagem">Minha Garagem</a>
                    <a href="#" onclick="mostrarAba('cartoes')" class="list-group-item list-group-item-action" id="aba-cartoes">Meus Cartões</a>
                    <a href="#" onclick="mostrarAba('enderecos')" class="list-group-item list-group-item-action" id="aba-enderecos">Meus Endereços</a>
                    <a href="#" onclick="mostrarAba('dados')" class="list-group-item list-group-item-action" id="aba-dados">Dados Pessoais</a>
                </div>
            </div>

            <div class="col-md-9">
                <div id="sec-pedidos"><div id="listaPedidos"></div></div>

                <div id="sec-garagem" class="d-none">
                    <div class="card shadow-sm border-0"><div class="card-header bg-white d-flex justify-content-between"><strong>Garagem</strong><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalVeiculo">+ Adicionar</button></div>
                    <div class="card-body" id="listaVeiculos"></div></div>
                </div>

                <div id="sec-cartoes" class="d-none">
                    <div class="card shadow-sm border-0"><div class="card-header bg-white d-flex justify-content-between"><strong>Cartões</strong><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalCartao">+ Adicionar</button></div>
                    <div class="card-body" id="listaCartoes"></div></div>
                </div>

                <div id="sec-enderecos" class="d-none">
                    <div class="card shadow-sm border-0"><div class="card-header bg-white d-flex justify-content-between"><strong>Endereços</strong><button class="btn btn-primary btn-sm" onclick="limparModalEndereco()">+ Adicionar</button></div>
                    <div class="card-body" id="listaEnderecos"></div></div>
                </div>

                <div id="sec-dados" class="d-none">
                    <div class="card shadow-sm border-0 p-4 mb-3">
                        <div class="row">
                            <div class="col-md-6 mb-3"><label>Nome</label><input type="text" id="editNome" class="form-control"></div>
                            <div class="col-md-6 mb-3"><label>Sobrenome</label><input type="text" id="editSobrenome" class="form-control"></div>
                        </div>
                        <div class="mb-3"><label>E-mail</label><input type="email" id="editEmail" class="form-control"></div>
                        <button onclick="salvarDados()" class="btn btn-primary">Salvar Alterações</button>
                    </div>
                    <div class="card border-danger"><div class="card-body d-flex justify-content-between align-items-center"><span class="text-danger fw-bold">Inativar minha conta permanentemente</span><button class="btn btn-outline-danger btn-sm" onclick="encerrarConta()">Encerrar Conta</button></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Veículo -->
    <div class="modal fade" id="modalVeiculo" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-body">
        <h6>Adicionar Veículo</h6>
        <input type="text" id="vMarca" class="form-control mb-2" placeholder="Marca">
        <input type="text" id="vModelo" class="form-control mb-2" placeholder="Modelo">
        <input type="number" id="vAno" class="form-control mb-2" placeholder="Ano">
        <input type="text" id="vVersao" class="form-control mb-2" placeholder="Versão">
        <button class="btn btn-primary w-100" onclick="adicionarVeiculo()">Salvar Veículo</button>
    </div></div></div></div>

    <!-- Modal Cartão -->
    <div class="modal fade" id="modalCartao" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-body">
        <h6>Adicionar Cartão</h6>
        <select id="cBandeira" class="form-select mb-2"><option>Visa</option><option>MasterCard</option><option>Elo</option></select>
        <input type="text" id="cNome" class="form-control mb-2" placeholder="Nome no Cartão">
        <input type="text" id="cNumero" class="form-control mb-2" placeholder="Número">
        <input type="text" id="cCvv" class="form-control mb-2" placeholder="CVV">
        <button class="btn btn-primary w-100" onclick="adicionarCartao()">Salvar Cartão</button>
    </div></div></div></div>

    <!-- Modal Endereço -->
    <div class="modal fade" id="modalEndereco" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-body">
        <input type="hidden" id="enderecoId">
        <input type="text" id="eNome" class="form-control mb-2" placeholder="Destinatário">
        <input type="text" id="eLogradouro" class="form-control mb-2" placeholder="Rua">
        <input type="text" id="eNumero" class="form-control mb-2" placeholder="Número">
        <input type="text" id="eCidade" class="form-control mb-2" placeholder="Cidade">
        <input type="text" id="eEstado" class="form-control mb-2" placeholder="UF">
        <button class="btn btn-primary w-100" onclick="salvarEndereco()">Salvar Endereço</button>
    </div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let clienteId = null;
        function mostrarAlerta(m, t='danger') { const el=document.getElementById('alerta'); el.className=`alert alert-${t}`; el.textContent=m; el.classList.remove('d-none'); setTimeout(()=>el.classList.add('d-none'), 3000); }

        function mostrarAba(aba) {
            ['pedidos', 'garagem', 'cartoes', 'enderecos', 'dados'].forEach(a => {
                document.getElementById(`sec-${a}`).classList.add('d-none');
                document.getElementById(`aba-${a}`).classList.remove('active');
            });
            document.getElementById(`sec-${aba}`).classList.remove('d-none');
            document.getElementById(`aba-${aba}`).classList.add('active');
            if(aba==='pedidos') carregarPedidos();
            if(aba==='garagem') carregarVeiculos();
            if(aba==='cartoes') carregarCartoes();
            if(aba==='enderecos') carregarEnderecos();
            if(aba==='dados') carregarDados();
        }

        async function carregarPedidos() {
            const res = await fetch(`/api/pedidos`);
            const pedidos = await res.json();
            document.getElementById('listaPedidos').innerHTML = pedidos.map(p => `
                <div class="order-card shadow-sm">
                    <div class="order-header"><strong>Pedido #${p.id}</strong>
                    <div><a href="troca.html?pedido=${p.id}" class="btn btn-kabum me-2">GERENCIAR</a><a href="confirmacao.html?pedido=${p.id}" class="btn btn-outline-dark btn-sm">DETALHES</a></div></div>
                    <div class="p-3"><span class="${p.status==='ENTREGUE'?'text-success':'text-warning'} fw-bold">${p.status}</span></div>
                </div>`).join('');
        }

        async function carregarVeiculos() {
            const res = await fetch(`/api/clientes/${clienteId}/veiculos`);
            const vs = await res.json();
            document.getElementById('listaVeiculos').innerHTML = vs.map(v => `<div class="border-bottom py-2 d-flex justify-content-between"><div><strong>${v.marca} ${v.modelo}</strong> (${v.ano}) - ${v.versao}</div><button class="btn btn-sm btn-outline-danger" onclick="removerVeiculo(${v.id})"><i class="fas fa-trash"></i></button></div>`).join('') || 'Vazio.';
        }

        async function adicionarVeiculo() {
            const dados = { marca: document.getElementById('vMarca').value, modelo: document.getElementById('vModelo').value, ano: document.getElementById('vAno').value, versao: document.getElementById('vVersao').value };
            await fetch(`/api/clientes/${clienteId}/veiculos`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(dados) });
            bootstrap.Modal.getInstance(document.getElementById('modalVeiculo')).hide(); carregarVeiculos();
        }

        async function carregarCartoes() {
            const res = await fetch(`/api/clientes/${clienteId}/cartoes`);
            const cs = await res.json();
            document.getElementById('listaCartoes').innerHTML = cs.map(c => `<div class="border-bottom py-2 d-flex justify-content-between"><div><strong>${c.bandeira}</strong> **** ${c.numero_final}</div><button class="btn btn-sm btn-outline-danger" onclick="removerCartao(${c.id})"><i class="fas fa-trash"></i></button></div>`).join('') || 'Vazio.';
        }

        async function adicionarCartao() {
            const num = document.getElementById('cNumero').value;
            const dados = { bandeira: document.getElementById('cBandeira').value, nome_impresso: document.getElementById('cNome').value, numero_final: num.slice(-4), token: 'tok_fake', principal: false };
            await fetch(`/api/clientes/${clienteId}/cartoes`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(dados) });
            bootstrap.Modal.getInstance(document.getElementById('modalCartao')).hide(); carregarCartoes();
        }

        async function carregarEnderecos() {
            const res = await fetch(`/api/clientes/${clienteId}/enderecos`);
            const es = await res.json();
            document.getElementById('listaEnderecos').innerHTML = es.map(e => `<div class="border rounded p-3 mb-2 d-flex justify-content-between"><div><strong>${e.nome_destinatario}</strong><br>${e.logradouro}, ${e.numero}</div><button class="btn btn-sm btn-outline-danger" onclick="removerEndereco(${e.id})"><i class="fas fa-trash"></i></button></div>`).join('');
        }

        async function carregarDados() {
            const res = await fetch(`/api/clientes/${clienteId}`);
            const c = await res.json();
            document.getElementById('editNome').value = c.nome; document.getElementById('editSobrenome').value = c.sobrenome; document.getElementById('editEmail').value = c.email;
        }

        async function salvarDados() {
            const dados = { nome: document.getElementById('editNome').value, sobrenome: document.getElementById('editSobrenome').value, email: document.getElementById('editEmail').value };
            await fetch(`/api/clientes/${clienteId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(dados) });
            mostrarAlerta('Salvo!', 'success');
        }

        async function removerVeiculo(id) { await fetch(`/api/clientes/${clienteId}/veiculos/${id}`, {method:'DELETE'}); carregarVeiculos(); }
        async function removerCartao(id) { await fetch(`/api/clientes/${clienteId}/cartoes/${id}`, {method:'DELETE'}); carregarCartoes(); }
        async function removerEndereco(id) { await fetch(`/api/clientes/${clienteId}/enderecos/${id}`, {method:'DELETE'}); carregarEnderecos(); }
        async function encerrarConta() { if(confirm('Sair?')) { await fetch(`/api/clientes/${clienteId}/inativar`, {method:'PATCH'}); sair(); } }
        
        function limparModalEndereco() { document.getElementById('enderecoId').value=''; new bootstrap.Modal(document.getElementById('modalEndereco')).show(); }
        function sair() { localStorage.removeItem('cliente'); window.location.href='login.html'; }

        window.onload = () => {
            const cliente = JSON.parse(localStorage.getItem('cliente'));
            if(!cliente) return window.location.href='login.html';
            clienteId = cliente.id; document.getElementById('aba-pedidos').click();
        };
    </script>
</body>
</html>
