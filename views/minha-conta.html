<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="index.html">HYPERPNEUS</a>
        <button onclick="sair()" class="btn btn-outline-light btn-sm">Sair</button></div>
    </nav>
    <div class="container">
        <h2>Meus Pedidos</h2>
        <div id="listaPedidos" class="mt-4">Carregando...</div>
    </div>
    <script>
        async function carregarPedidos() {
            const lista = document.getElementById('listaPedidos');
            try {
                const res = await fetch('/api/pedidos', { credentials: 'include' });
                if (res.status === 401) {
                    lista.innerHTML = '<div class="alert alert-warning">Você não está logado. <a href="login.html">Ir para Login</a></div>';
                    return;
                }
                const pedidos = await res.json();
                if (!Array.isArray(pedidos) || pedidos.length === 0) {
                    lista.innerHTML = '<div class="alert alert-info">Nenhum pedido encontrado.</div>';
                    return;
                }
                lista.innerHTML = pedidos.map(p => `
                    <div class="card mb-3 p-3">
                        <div class="d-flex justify-content-between">
                            <strong>Pedido #${p.id}</strong>
                            <span>${parseFloat(p.total).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span>
                        </div>
                        <p>Status: ${p.status.replace(/_/g, ' ')}</p>
                        <a href="confirmacao.html?pedido=${p.id}&modo=visualizar" class="btn btn-dark btn-sm">Ver Detalhes</a>
                    </div>
                `).join('');
            } catch (err) {
                lista.innerHTML = '<div class="alert alert-danger">Erro de conexão.</div>';
            }
        }
        function sair() { localStorage.removeItem('cliente'); window.location.href = 'login.html'; }
        window.onload = carregarPedidos;
    </script>
</body>
</html>
