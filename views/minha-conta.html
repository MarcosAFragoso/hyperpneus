<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --kabum-blue: #0060b1; --kabum-orange: #ff6500; }
        body { background-color: #f2f3f5; }
        .list-group-item.active { background-color: var(--kabum-blue); border-color: var(--kabum-blue); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="index.html">HYPERPNEUS</a>
        <div class="text-white small"><span id="nomeNav"></span> <button onclick="sair()" class="btn btn-outline-light btn-sm">Sair</button></div></div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a href="#" onclick="mostrarAba('pedidos')" class="list-group-item list-group-item-action active" id="aba-pedidos">Meus Pedidos</a>
                    <a href="#" onclick="mostrarAba('garagem')" class="list-group-item list-group-item-action" id="aba-garagem">Minha Garagem</a>
                    <a href="#" onclick="mostrarAba('cartoes')" class="list-group-item list-group-item-action" id="aba-cartoes">Meus Cartões</a>
                    <a href="#" onclick="mostrarAba('enderecos')" class="list-group-item list-group-item-action" id="aba-enderecos">Meus Endereços</a>
                    <a href="#" onclick="mostrarAba('dados')" class="list-group-item list-group-item-action" id="aba-dados">Dados Pessoais</a>
                </div>
            </div>
            <div class="col-md-9">
                <div id="sec-pedidos"><div id="listaPedidos"></div></div>
                <!-- Garagem -->
                <div id="sec-garagem" class="d-none"><div class="card p-3"><div class="d-flex justify-content-between mb-3"><strong>Garagem</strong><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalVeiculo">+ Adicionar</button></div><div id="listaVeiculos"></div></div></div>
                <!-- Cartões -->
                <div id="sec-cartoes" class="d-none"><div class="card p-3"><div class="d-flex justify-content-between mb-3"><strong>Meus Cartões</strong><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalCartao">+ Adicionar</button></div><div id="listaCartoes"></div></div></div>
                <!-- Endereços -->
                <div id="sec-enderecos" class="d-none"><div class="card p-3"><div class="d-flex justify-content-between mb-3"><strong>Endereços</strong><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalEndereco">+ Adicionar</button></div><div id="listaEnderecos"></div></div></div>
                <!-- Dados -->
                <div id="sec-dados" class="d-none"><div class="card p-4"><div id="formDados"></div><button class="btn btn-danger mt-3" onclick="inativarConta()">Inativar Conta</button></div></div>
            </div>
        </div>
    </div>

    <!-- Modais Completos -->
    <!-- Modal Veiculo -->
    <div class="modal fade" id="modalVeiculo" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Veículo</h5></div><div class="modal-body">
        <input type="text" id="vMarca" class="form-control mb-2" placeholder="Marca">
        <input type="text" id="vModelo" class="form-control mb-2" placeholder="Modelo">
        <input type="number" id="vAno" class="form-control mb-2" placeholder="Ano">
        <button class="btn btn-primary w-100" onclick="salvarItem('veiculos', {marca: document.getElementById('vMarca').value, modelo: document.getElementById('vModelo').value, ano: document.getElementById('vAno').value})">Salvar</button>
    </div></div></div></div>

    <!-- Modal Cartão -->
    <div class="modal fade" id="modalCartao" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Cartão</h5></div><div class="modal-body">
        <input type="text" id="cBand" class="form-control mb-2" placeholder="Bandeira (Visa/Master)">
        <input type="text" id="cNome" class="form-control mb-2" placeholder="Nome impresso">
        <input type="text" id="cNum" class="form-control mb-2" placeholder="Número Completo">
        <input type="text" id="cCvv" class="form-control mb-2" placeholder="CVV">
        <button class="btn btn-primary w-100" onclick="salvarItem('cartoes', {bandeira: document.getElementById('cBand').value, nome_impresso: document.getElementById('cNome').value, numero: document.getElementById('cNum').value, cvv: document.getElementById('cCvv').value})">Salvar</button>
    </div></div></div></div>

    <!-- Modal Endereço com CEP -->
    <div class="modal fade" id="modalEndereco" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Endereço</h5></div><div class="modal-body">
        <input type="text" id="eCep" class="form-control mb-2" placeholder="CEP" onblur="buscarCEP()">
        <input type="text" id="eLog" class="form-control mb-2" placeholder="Logradouro">
        <input type="text" id="eNum" class="form-control mb-2" placeholder="Número">
        <input type="text" id="eCid" class="form-control mb-2" placeholder="Cidade">
        <button class="btn btn-primary w-100" onclick="salvarItem('enderecos', {cep: document.getElementById('eCep').value, logradouro: document.getElementById('eLog').value, numero: document.getElementById('eNum').value, cidade: document.getElementById('eCid').value})">Salvar</button>
    </div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let clienteId = null;

        function mostrarAba(aba) {
            document.querySelectorAll('.list-group-item').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('[id^="sec-"]').forEach(s => s.classList.add('d-none'));
            document.getElementById(`aba-${aba}`).classList.add('active');
            document.getElementById(`sec-${aba}`).classList.remove('d-none');
            if(aba==='pedidos') carregarPedidos();
            else if(aba==='garagem') carregarVeiculos();
            else if(aba==='cartoes') carregarCartoes();
            else if(aba==='enderecos') carregarEnderecos();
            else if(aba==='dados') carregarDados();
        }

        async function buscarCEP() {
            const cep = document.getElementById('eCep').value;
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if(data.logradouro) {
                document.getElementById('eLog').value = data.logradouro;
                document.getElementById('eCid').value = data.localidade;
            }
        }

        async function salvarItem(tipo, dados) {
            await fetch(`/api/clientes/${clienteId}/${tipo}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados),
                credentials: 'include'
            });
            window.location.reload();
        }

        async function removerItem(tipo, id) {
            if(!confirm('Remover item?')) return;
            await fetch(`/api/clientes/${clienteId}/${tipo}/${id}`, { method: 'DELETE', credentials: 'include' });
            window.location.reload();
        }

        async function carregarCartoes() {
            const res = await fetch(`/api/clientes/${clienteId}/cartoes`, { credentials: 'include' });
            const cs = await res.json();
            document.getElementById('listaCartoes').innerHTML = cs.map(c => `
                <div class="d-flex justify-content-between border-bottom py-2">
                    <span>${c.bandeira} - ${c.numero_final}</span>
                    <button class="btn btn-outline-danger btn-sm" onclick="removerItem('cartoes', ${c.id})"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function carregarVeiculos() {
            const res = await fetch(`/api/clientes/${clienteId}/veiculos`, { credentials: 'include' });
            const vs = await res.json();
            document.getElementById('listaVeiculos').innerHTML = vs.map(v => `
                <div class="d-flex justify-content-between border-bottom py-2">
                    <span>${v.marca} ${v.modelo}</span>
                    <button class="btn btn-outline-danger btn-sm" onclick="removerItem('veiculos', ${v.id})"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function carregarPedidos() {
            const res = await fetch('/api/pedidos', { credentials: 'include' });
            const p = await res.json();
            document.getElementById('listaPedidos').innerHTML = p.map(x => `
                <div class="order-card p-3 shadow-sm">
                    <strong>Pedido #${x.id}</strong> - ${parseFloat(x.total).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
                    <div class="mt-2"><a href="confirmacao.html?pedido=${x.id}" class="btn btn-dark btn-sm">DETALHES</a> <a href="troca.html?pedido=${x.id}" class="btn btn-kabum">TROCAR</a></div>
                </div>`).join('');
        }

        async function carregarEnderecos() {
             const res = await fetch(`/api/clientes/${clienteId}/enderecos`, { credentials: 'include' });
             const es = await res.json();
             document.getElementById('listaEnderecos').innerHTML = es.map(e => `
                <div class="d-flex justify-content-between border-bottom py-2">
                    <span>${e.logradouro}, ${e.numero}</span>
                    <button class="btn btn-outline-danger btn-sm" onclick="removerItem('enderecos', ${e.id})"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }
        
        async function carregarDados() {
            const res = await fetch(`/api/clientes/${clienteId}`, { credentials: 'include' });
            const c = await res.json();
            document.getElementById('formDados').innerHTML = `<p><b>Nome:</b> ${c.nome} ${c.sobrenome}</p><p><b>Email:</b> ${c.email}</p>`;
        }

        function sair() { localStorage.removeItem('cliente'); window.location.href = 'login.html'; }
        
        window.onload = () => {
            const c = JSON.parse(localStorage.getItem('cliente') || '{}');
            if(!c.id) window.location.href = 'login.html';
            clienteId = c.id;
            document.getElementById('nomeNav').textContent = `Olá, ${c.nome}!`;
            carregarPedidos();
        };
    </script>
</body>
</html>
