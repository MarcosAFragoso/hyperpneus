<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --kabum-blue: #0060b1; --kabum-orange: #ff6500; }
        body { background-color: #f2f3f5; font-family: 'Segoe UI', sans-serif; }
        .list-group-item.active { background-color: var(--kabum-blue); border-color: var(--kabum-blue); font-weight: bold; }
        .order-card { background: white; border-radius: 4px; border: 1px solid #eee; margin-bottom: 15px; }
        .btn-kabum { background: var(--kabum-orange); color: #fff; font-weight: bold; font-size: 12px; padding: 8px 15px; border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="index.html">HYPERPNEUS</a>
        <div class="text-white small"><span id="nomeNav"></span> <button onclick="sair()" class="btn btn-outline-light btn-sm">Sair</button></div></div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group shadow-sm">
                    <a href="#" onclick="mostrarAba('pedidos')" class="list-group-item list-group-item-action active" id="aba-pedidos">Meus Pedidos</a>
                    <a href="#" onclick="mostrarAba('garagem')" class="list-group-item list-group-item-action" id="aba-garagem">Minha Garagem</a>
                    <a href="#" onclick="mostrarAba('cartoes')" class="list-group-item list-group-item-action" id="aba-cartoes">Meus Cartões</a>
                    <a href="#" onclick="mostrarAba('enderecos')" class="list-group-item list-group-item-action" id="aba-enderecos">Meus Endereços</a>
                    <a href="#" onclick="mostrarAba('dados')" class="list-group-item list-group-item-action" id="aba-dados">Dados Pessoais</a>
                </div>
            </div>
            <div class="col-md-9">
                <div id="sec-pedidos"><div id="listaPedidos"></div></div>
                <div id="sec-garagem" class="d-none"><div class="card shadow-sm"><div class="card-header bg-white d-flex justify-content-between"><strong>Garagem</strong><button class="btn btn-primary btn-sm" onclick="abrirModalVeiculo()">+ Adicionar</button></div><div class="card-body" id="listaVeiculos"></div></div></div>
                <div id="sec-cartoes" class="d-none"><div class="card shadow-sm"><div class="card-header bg-white d-flex justify-content-between"><strong>Cartões</strong><button class="btn btn-primary btn-sm" onclick="abrirModalCartao()">+ Adicionar</button></div><div class="card-body" id="listaCartoes"></div></div></div>
                <div id="sec-enderecos" class="d-none"><div class="card shadow-sm"><div class="card-header bg-white d-flex justify-content-between"><strong>Endereços</strong><button class="btn btn-primary btn-sm" onclick="abrirModalEndereco()">+ Adicionar</button></div><div class="card-body" id="listaEnderecos"></div></div></div>
                <div id="sec-dados" class="d-none"><div class="card shadow-sm p-4"><div id="formDados"></div><button class="btn btn-danger mt-3" onclick="encerrarConta()">Inativar Conta</button></div></div>
            </div>
        </div>
    </div>

    <!-- Modais simplificados para manter a estrutura -->
    <div class="modal fade" id="modalGeral" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-body" id="corpoModal"></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let clienteId = null;

        function mostrarAba(aba) {
            document.querySelectorAll('.list-group-item').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('[id^="sec-"]').forEach(s => s.classList.add('d-none'));
            document.getElementById(`aba-${aba}`).classList.add('active');
            document.getElementById(`sec-${aba}`).classList.remove('d-none');
            if(aba==='pedidos') carregarPedidos();
            else if(aba==='garagem') carregarVeiculos();
            else if(aba==='cartoes') carregarCartoes();
            else if(aba==='enderecos') carregarEnderecos();
            else if(aba==='dados') carregarDados();
        }

        async function carregarPedidos() {
            const lista = document.getElementById('listaPedidos');
            lista.innerHTML = 'Carregando...';
            try {
                const res = await fetch('/api/pedidos', { credentials: 'include' });
                const pedidos = await res.json();
                lista.innerHTML = pedidos.map(p => `
                    <div class="order-card p-3 shadow-sm">
                        <div class="d-flex justify-content-between"><strong>Pedido #${p.id}</strong> <span>${parseFloat(p.total).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span></div>
                        <div class="mt-2 text-muted">Status: ${p.status.replace(/_/g, ' ')}</div>
                        <div class="mt-2"><a href="confirmacao.html?pedido=${p.id}&modo=visualizar" class="btn btn-dark btn-sm">DETALHES</a> <a href="troca.html?pedido=${p.id}" class="btn btn-kabum">GERENCIAR</a></div>
                    </div>`).join('');
            } catch(e) { lista.innerHTML = 'Erro.'; }
        }

        // Funções placeholders para manter sua interface funcionando enquanto você preenche a lógica de API
        async function carregarVeiculos() { document.getElementById('listaVeiculos').innerHTML = 'Função ativa: Conecte ao seu veiculoController'; }
        async function carregarCartoes() { document.getElementById('listaCartoes').innerHTML = 'Função ativa: Conecte ao seu cartaoController'; }
        async function carregarEnderecos() { document.getElementById('listaEnderecos').innerHTML = 'Função ativa: Conecte ao seu enderecoController'; }
        async function carregarDados() { document.getElementById('formDados').innerHTML = 'Dados do Cliente aqui'; }
        
        function abrirModalVeiculo() { new bootstrap.Modal(document.getElementById('modalGeral')).show(); }
        function abrirModalCartao() { new bootstrap.Modal(document.getElementById('modalGeral')).show(); }
        function abrirModalEndereco() { new bootstrap.Modal(document.getElementById('modalGeral')).show(); }
        function encerrarConta() { if(confirm('Tem certeza?')) console.log('Inativando...'); }
        function sair() { localStorage.removeItem('cliente'); window.location.href = 'login.html'; }

        window.onload = () => {
            const c = JSON.parse(localStorage.getItem('cliente') || '{}');
            if(!c.id) window.location.href = 'login.html';
            clienteId = c.id;
            document.getElementById('nomeNav').textContent = `Olá, ${c.nome}!`;
            carregarPedidos();
        };
    </script>
</body>
</html>
