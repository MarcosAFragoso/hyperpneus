<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carrinho - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">HyperPneus</a>
  </div>
</nav>

<div class="container my-5">
    <!-- TIMER DE BLOQUEIO (REQUISITO CRÍTICO) -->
    <div class="alert alert-warning text-center fw-bold shadow-sm d-flex justify-content-center align-items-center gap-2">
        <i class="fas fa-clock fa-lg"></i> 
        <span>ESTOQUE RESERVADO POR:</span> 
        <span class="text-danger fs-5" id="timer">04:59</span>
    </div>

    <h3 class="mb-3">Seu Carrinho</h3>
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Preço Unit.</th>
                        <th>Total</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="d-flex align-items-center">
                                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_Kkh-yQ6JbV3ZqgXU_0VvX4VqXyXyXyXyXw&s" style="width: 60px;" class="me-3 border rounded">
                                <div>
                                    <strong>Pneu Pirelli Cinturato P1</strong><br>
                                    <small class="text-muted">Aro 14</small>
                                </div>
                            </div>
                        </td>
                        <td>
                            <input type="number" value="4" class="form-control" style="width: 70px;">
                        </td>
                        <td>R$ 459,90</td>
                        <td class="fw-bold">R$ 1.839,60</td>
                        <td><button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <h5 class="card-title">Cupom de Troca / Desconto</h5>
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Digite seu código">
                    <button class="btn btn-outline-secondary">Aplicar</button>
                </div>
                <small class="text-muted mt-2 d-block">Possui saldo de troca? Digite o código aqui.</small>
            </div>
        </div>
        <div class="col-md-6 text-end">
            <h4 class="mb-3">Total: <span class="text-primary">R$ 1.839,60</span></h4>
            <div class="d-flex gap-2 justify-content-end">
                <a href="index.html" class="btn btn-outline-secondary btn-lg">Continuar Comprando</a>
                <a href="checkout.html" class="btn btn-success btn-lg px-5 shadow">FECHAR PEDIDO <i class="fas fa-check"></i></a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
