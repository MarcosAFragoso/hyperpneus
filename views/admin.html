<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="overflow-x: hidden;">

<div class="d-flex">
    <!-- Sidebar -->
    <div class="bg-dark text-white p-3 min-vh-100 d-flex flex-column" style="width: 260px;">
        <h4 class="mb-4 text-center"><i class="fas fa-cogs"></i> HyperAdmin</h4>
        <hr>
        <ul class="nav flex-column gap-2">
            <li class="nav-item"><a href="#" class="nav-link text-white active bg-primary rounded"><i class="fas fa-chart-line w-25"></i> Dashboard</a></li>
            <li class="nav-item"><a href="#" class="nav-link text-white-50"><i class="fas fa-users w-25"></i> Clientes</a></li>
            <li class="nav-item"><a href="#" class="nav-link text-white-50"><i class="fas fa-box w-25"></i> Produtos</a></li>
            <li class="nav-item"><a href="#" class="nav-link text-warning fw-bold"><i class="fas fa-exchange-alt w-25"></i> Trocas <span class="badge bg-danger ms-2">3</span></a></li>
        </ul>
        <div class="mt-auto">
            <a href="index.html" class="btn btn-outline-light w-100 btn-sm">Ir para Loja</a>
        </div>
    </div>

    <!-- Conteúdo -->
    <div class="p-4 w-100 bg-light">
        <h2 class="mb-4">Dashboard de Vendas</h2>
        
        <!-- Filtro de Data -->
        <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body d-flex gap-3 align-items-end">
                <div>
                    <label class="form-label small fw-bold">Data Início</label>
                    <input type="date" class="form-control">
                </div>
                <div>
                    <label class="form-label small fw-bold">Data Fim</label>
                    <input type="date" class="form-control">
                </div>
                <button class="btn btn-primary"><i class="fas fa-filter"></i> Filtrar</button>
            </div>
        </div>

        <div class="row g-4">
            <!-- Gráfico (Obrigatório) -->
            <div class="col-md-8">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white fw-bold">Evolução de Faturamento (R$)</div>
                    <div class="card-body">
                        <canvas id="myChart" style="max-height: 300px;"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- Cards de KPI -->
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3 shadow">
                    <div class="card-body">
                        <h5 class="card-title">Vendas Totais</h5>
                        <h2 class="fw-bold">R$ 45.200,00</h2>
                        <small><i class="fas fa-arrow-up"></i> 12% vs mês anterior</small>
                    </div>
                </div>
                <div class="card text-white bg-warning mb-3 shadow">
                    <div class="card-body">
                        <h5 class="card-title">Solicitações de Troca</h5>
                        <h2 class="fw-bold">3 Pendentes</h2>
                        <small>Aguardando sua aprovação</small>
                        <button class="btn btn-sm btn-light text-dark mt-2 w-100">Ver Solicitações</button>
                    </div>
                </div>
                <div class="card text-white bg-info mb-3 shadow">
                    <div class="card-body">
                        <h5 class="card-title">Estoque Baixo</h5>
                        <h2 class="fw-bold">15 Itens</h2>
                        <small>Precisam de reposição</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('myChart');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['01/Fev', '05/Fev', '10/Fev', '15/Fev', '20/Fev', '25/Fev'],
            datasets: [{
                label: 'Vendas (R$)',
                data: [1200, 1900, 300, 5000, 2300, 4500],
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13, 110, 253, 0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
</script>

</body>
</html>
