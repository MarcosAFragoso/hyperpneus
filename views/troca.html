<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Solicitar Troca - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border: 1px solid #eee;
            padding: 5px;
            border-radius: 4px;
        }

        .btn-confirmar {
            background-color: #ff6500;
            color: white;
            font-weight: bold;
            border: none;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container my-5">
        <a href="minha-conta.html" class="text-muted"><i class="fas fa-arrow-left"></i> Voltar</a>
        <h2 class="fw-bold my-3">Troca ou Devolução</h2>
        <div class="card shadow-sm p-4">
            <h5 class="fw-bold" id="tituloPedido">Carregando...</h5>
            <div id="containerItens" class="my-4"></div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Motivo</label>
                    <select id="motivoTroca" class="form-select">
                        <option>Produto com defeito</option>
                        <option>Comprei medida errada</option>
                        <option>Arrependimento</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Desejo</label>
                    <select id="acaoDesejada" class="form-select">
                        <option value="Vale-Troca">Vale-Troca (Crédito)</option>
                        <option value="Estorno">Estorno no cartão</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-confirmar" onclick="finalizarTroca()">SOLICITAR AGORA</button>
        </div>
    </div>

    <script>
        let pedidoId = null;
        async function carregarPedidoReal() {
            const params = new URLSearchParams(window.location.search);
            pedidoId = params.get('pedido');
            const res = await fetch(`/api/pedidos/${pedidoId}`);
            const dados = await res.json();
            document.getElementById('tituloPedido').textContent = `Pedido #${dados.id}`;
            document.getElementById('containerItens').innerHTML = dados.itens.map((item, index) => `
                <div class="d-flex align-items-center mb-3 border-bottom pb-3 item-troca" data-preco="${item.preco_unitario}">
                    <input class="form-check-input check-item me-3" type="checkbox">
                    <img src="${item.imagem_url || ''}" class="product-img me-3">
                    <div class="flex-grow-1">
                        <label class="fw-bold">${item.marca} ${item.modelo}</label><br>
                        <small>R$ ${item.preco_unitario}</small>
                    </div>
                    <select class="form-select w-auto qtd-devolver">
                        ${Array.from({ length: item.quantidade }, (_, i) => `<option value="${i + 1}">${i + 1} und</option>`).join('')}
                    </select>
                </div>
            `).join('');
        }

        async function finalizarTroca() {
            const itens = document.querySelectorAll('.item-troca');
            const acao = document.getElementById('acaoDesejada').value;
            let valorTotal = 0;
            itens.forEach(item => {
                if (item.querySelector('.check-item').checked) {
                    valorTotal += (parseInt(item.querySelector('.qtd-devolver').value) * parseFloat(item.getAttribute('data-preco')));
                }
            });

            if (valorTotal <= 0) return alert("Selecione itens.");

            const res = await fetch('/api/pedidos/gerar-cupom-troca', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pedidoId, valor: valorTotal, acao })
            });

            const data = await res.json();
            if (res.ok) {
                alert(acao === 'Estorno' ? "Estorno solicitado!" : "Cupom gerado: " + data.codigo);
                window.location.href = "minha-conta.html";
            } else {
                alert("Erro: " + data.erro);
            }
        }
        window.onload = carregarPedidoReal;
    </script>
</body>

</html>
