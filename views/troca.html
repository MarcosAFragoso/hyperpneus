<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Solicitar Troca - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border: 1px solid #eee;
            padding: 5px;
            border-radius: 4px;
        }

        .btn-confirmar {
            background-color: #ff6500;
            color: white;
            font-weight: bold;
            border: none;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container my-5">
        <a href="minha-conta.html" class="text-muted text-decoration-none"><i class="fas fa-arrow-left"></i> Voltar</a>
        <h2 class="fw-bold my-3">Troca ou Devolução</h2>

        <div class="card shadow-sm p-4">
            <h5 class="fw-bold" id="tituloPedido">Carregando...</h5>
            <div id="containerItens" class="my-4"></div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Motivo</label>
                    <select id="motivoTroca" class="form-select">
                        <option>Produto com defeito</option>
                        <option>Comprei medida errada</option>
                        <option>Arrependimento</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="fw-bold">Desejo</label>
                    <select id="acaoDesejada" class="form-select">
                        <option value="Vale-Troca">Vale-Troca (Crédito)</option>
                        <option value="Estorno">Estorno no cartão</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-confirmar w-100 py-2" onclick="finalizarTroca()">SOLICITAR AGORA</button>
            <div id="resultadoTroca" class="mt-3"></div>
        </div>
    </div>

    <script>
        let pedidoId = null;

        async function carregarPedidoReal() {
            const params = new URLSearchParams(window.location.search);
            pedidoId = params.get('pedido');
            const res = await fetch(`/api/pedidos/${pedidoId}`);
            const dados = await res.json();

            // Título dinâmico sem o "Carregando"
            document.getElementById('tituloPedido').textContent = `Pedido #${dados.id}`;

            const trocas = dados.trocasFeitas || [];

            document.getElementById('containerItens').innerHTML = dados.itens.map((item, index) => {
                const trocaInfo = trocas.find(t => t.pneu_id === item.pneu_id);

                return `
        <div class="d-flex align-items-center mb-3 border-bottom pb-3 item-troca" data-preco="${item.preco_unitario}">
            ${trocaInfo ?
                        `<div class="text-success me-3"><i class="fas fa-check-circle"></i> Trocado</div>` :
                        `<input class="form-check-input check-item me-3" type="checkbox" value="${item.pneu_id}">`
                    }
            <img src="${item.imagem_url || ''}" class="product-img me-3">
            <div class="flex-grow-1">
                <label class="fw-bold">${item.marca} ${item.modelo}</label><br>
                <small>R$ ${item.preco_unitario}</small>
                ${trocaInfo ? `<br><small class="text-primary fw-bold">Cupom: ${trocaInfo.codigo}</small>` : ''}
            </div>
            ${!trocaInfo ? `
                <select class="form-select w-auto qtd-devolver">
                    ${Array.from({ length: item.quantidade }, (_, i) => `<option value="${i + 1}">${i + 1} und</option>`).join('')}
                </select>` : ''
                    }
        </div>`;
            }).join('');
        }

        async function finalizarTroca() {
            const linhas = document.querySelectorAll('.item-troca');
            let itensParaTroca = [];
            let valorTotal = 0;

            linhas.forEach(linha => {
                const checkbox = linha.querySelector('.check-item');
                if (checkbox.checked) {
                    const pneuId = parseInt(checkbox.value);
                    const qtd = parseInt(linha.querySelector('.qtd-devolver').value);
                    const preco = parseFloat(linha.getAttribute('data-preco'));
                    itensParaTroca.push({ pneu_id: pneuId, qtd: qtd });
                    valorTotal += (qtd * preco);
                }
            });

            if (itensParaTroca.length === 0) return alert("Selecione pelo menos um item para prosseguir.");

            const acao = document.getElementById('acaoDesejada').value;
            const res = await fetch('/api/pedidos/gerar-cupom-troca', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pedidoId, itensParaTroca, valorTotal, acao })
            });

            const data = await res.json();
            const divResultado = document.getElementById('resultadoTroca');

            if (res.ok) {
                divResultado.innerHTML = `
                    <div class="alert alert-success mt-3">
                        <i class="fas fa-check-circle"></i> ${acao === 'Estorno' ? 'Solicitação enviada com sucesso!' : 'Troca realizada! Cupom: <strong>' + data.codigo + '</strong>'}
                    </div>`;
            } else {
                // AQUI ESTÁ A MUDANÇA: Mensagem amigável sem mostrar IDs técnicos
                divResultado.innerHTML = `
                    <div class="alert alert-warning mt-3">
                        <i class="fas fa-exclamation-circle"></i> Atenção: Alguns itens selecionados já possuem uma solicitação de troca ativa.
                    </div>`;
            }
        }
        window.onload = carregarPedidoReal;
    </script>
</body>

</html>
