<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solicitar Troca - HyperPneus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">HyperPneus</a>
  </div>
</nav>

<div class="container my-5">
    <a href="minha-conta.html" class="text-decoration-none mb-3 d-inline-block"><i class="fas fa-arrow-left"></i> Voltar para Minha Conta</a>
    
    <h2 class="mb-3">Solicitação de Troca / Devolução</h2>
    <div class="alert alert-warning border-warning">
        <i class="fas fa-exclamation-triangle"></i> <strong>Atenção:</strong> Para troca de pneus, o produto não pode ter sido rodado/montado e deve estar com a etiqueta original.
    </div>

    <div class="card shadow">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0">Pedido #12345 - Selecione os itens que deseja devolver</h5>
        </div>
        <div class="card-body p-4">
            <!-- Item 1 -->
            <div class="form-check d-flex align-items-center mb-4 border-bottom pb-4">
                <input class="form-check-input me-3" type="checkbox" id="item1" checked style="transform: scale(1.2);">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_Kkh-yQ6JbV3ZqgXU_0VvX4VqXyXyXyXyXw&s" width="70" class="me-3 border rounded">
                <div class="flex-grow-1">
                    <label class="form-check-label fw-bold fs-5" for="item1">Pneu Pirelli Cinturato P1 - Aro 14</label>
                    <div class="text-muted">Qtd Comprada: 4 | Valor Unit: R$ 459,90</div>
                </div>
                <div>
                    <label class="small text-muted">Qtd a devolver:</label>
                    <select class="form-select form-select-sm">
                        <option>1 unidade</option>
                        <option>2 unidades</option>
                        <option selected>4 unidades</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Motivo da Troca (Obrigatório)</label>
                    <select class="form-select">
                        <option disabled selected>Selecione...</option>
                        <option>Comprei a medida errada</option>
                        <option>Produto com defeito de fábrica</option>
                        <option>Arrependimento (7 dias)</option>
                        <option>Veículo incompatível</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Ação Desejada</label>
                    <select class="form-select">
                        <option>Cupom de Troca (Crédito na Loja)</option>
                        <option>Estorno no Cartão</option>
                    </select>
                </div>
                <div class="col-12 mb-4">
                    <label class="form-label">Descreva o problema (opcional)</label>
                    <textarea class="form-control" rows="3" placeholder="Ex: O pneu veio com uma deformação na lateral..."></textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="minha-conta.html" class="btn btn-secondary">Cancelar</a>
                <button class="btn btn-danger px-4" onclick="confirmarTroca()">CONFIRMAR SOLICITAÇÃO</button>
            </div>
        </div>
    </div>
</div>

<script>
    function confirmarTroca() {
        alert("Solicitação enviada com sucesso!\n\nUm administrador analisará seu pedido. Assim que os pneus chegarem ao nosso estoque, seu Cupom será liberado.");
        window.location.href = "minha-conta.html";
    }
</script>

</body>
</html>
